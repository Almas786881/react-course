<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
  <style>
    body{
        font-family:Arial;
    }
    .button-send{
        background-color:green;
        color:white;
        border:none;
        padding:12px 20px;
        margin-left:10px;
        cursor:pointer;
        border-radius:10px;
        font-size:15px;

    }
    .input-box{
        padding:12px 20px;
        border-radius:10px;
        border:1px solid #ccc;
        font-size:15px;

        flex-grow:1;
    }
    .chat-input{
        display:flex;
    }
    .app-container{
        max-width:"600px";
        margin-left:auto;
        margin-right:auto;

    }
    .user-message{
        display:flex;
        justify-content:flex-end;
        align-items:start;
    }
    .chatbot-message{
        display:flex;
        justify-content:flex-start;
        align-items:start;

    }
    .message-text{
        background-color:grey;
        padding:15px 20px;
        border-radius:10px;
        margin-right:10px;
        margin-left:10px;
        margin-bottom:10px;
        max-width:300px;
        

    }
    .chat-image{
        width:50px;
        height:50px;
    }


  </style>
</head>
<body>

  <div class="js-container"></div>
  
  <script src="react-basics.js"></script>
  <script src="https://unpkg.com/SuperSimpledev@3.2.1/external-library.js"></script>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">

    function ChatInput({chatMessages,setChatMessages}){   // ✅ FIXED
        const[inputText,setInputText]=React.useState("");
        
        function saveInputText(event){
            setInputText(event.target.value);
        }

        function sendMessage(){
            const newChatMessages=[...chatMessages,{
                message:inputText,
                sender:'user',
                id:crypto.randomUUID()
            }];
            
            const response= Chatbot.getResponse(inputText);
           
            setChatMessages([...newChatMessages,{   // ✅ FIXED (use updated array)
                message:response,
                sender:'chatbot',
                id:crypto.randomUUID()
            }]);

            setInputText('');
        }
            
        return (
            <div className="chat-input">
            <input placeholder="Send a message here..." size="30" 
            onChange={saveInputText}
            value={inputText}
            className="input-box"
            />
            <button  onClick={sendMessage} className="button-send">Send</button>
            </div>
        );
    }

    function ChatMessage({message,sender}){

        return (
            <div className={sender==='user'?'user-message':'chatbot-message'}>
                {sender=='chatbot'&& <img src= "robot.png" className="chat-image" />}
                <div className="message-text">
                {message}
                </div>
                {sender=="user"&& <img src= "profile.png" className="chat-image" />}    
            </div>
        );
    }

    function ChatMessages({chatMessages}){ 
        const chatMessagesRef=React.useRef(null);
        React.useEffect(()=>{
            const chatContainer=chatMessagesRef.current;
            if(chatContainer){
                chatContainer.scrollTop=chatContainer.scrollHeight;
            }
        },[chatMessages]);
        return (
            <div className="chat-messages container">
                ref
            {chatMessages.map((chatMessage)=>(
                <ChatMessage
                message={chatMessage.message}
                sender={chatMessage.sender}
                key={chatMessage.id}
                />
            ))}
            </div>
        );
    }

    function App(){
        const array=React.useState([
            {message:"Hi there!",sender:"user",id:"id1"},
            {message:"Hello! How can i help you today?",sender:"chatbot",id:"id2"},
            {message:"can you tell me todays date?",sender:"user",id:"id3"},
            {message:"Sure! Today's date is 6/7/2024.",sender:"chatbot",id:"id4"}
        ]);

        const chatMessages=array[0];
        const setChatMessages=array[1];

        return (
            <div className="app-container">
            <ChatInput
            chatMessages={chatMessages}
            setChatMessages={setChatMessages} /> 
            
            <ChatMessages chatMessages={chatMessages} />  
            
            </div>
        );
    }
    
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
  </script>

</body>
</html>
